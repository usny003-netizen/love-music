<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- ===========================
PIN
=========================== -->
<div id="pinBox">
    <h1>🔒 Secret Love</h1>
    <p>กรุณาใส่รหัสก่อนเปิดเซอร์ไพรส์</p>
    <input
        id="pinInput"
        type="password"
        maxlength="4"
        placeholder="••••">
    <button id="pinBtn">
        เปิดเซอร์ไพรส์ 💕
    </button>
    <p id="pinError"></p>
</div>
<!-- ===========================
MAIN
=========================== -->
<div id="mainContent">
<div class="container">
<h1>💖 Happy Anniversary 💖</h1>
<p>แตะซองจดหมายด้านล่าง</p>
<div id="envelope">
💌
</div>
<div id="message">
<img
id="lovePhoto"
src="https://raw.githubusercontent.com/usny003-netizen/love-music/main/1.jpg">
<h2>
ถึงคนที่เรารัก ❤️
</h2>
<p id="typingText"></p>
<h3 id="counter"></h3>
<div class="gallery">
<img src="https://raw.githubusercontent.com/usny003-netizen/love-music/main/1.jpg">
<img src="https://raw.githubusercontent.com/usny003-netizen/love-music/main/2.jpg">
<img src="https://raw.githubusercontent.com/usny003-netizen/love-music/main/3.jpg">
</div>
<p id="photoCaption"></p>
</div>
</div>
</div>
<!-- เอฟเฟกต์ -->
<div id="stars"></div>
<div id="hearts"></div>
<div id="petals"></div>
<!-- เพลง -->
<audio id="loveSong">
<source
src="https://raw.githubusercontent.com/usny003-netizen/love-music/main/love.mp3"
type="audio/mpeg">
</audio>
<!-- ตอนจบ -->
<div id="ending">
<h1>
💖 รักเธอวันนี้ พรุ่งนี้ และตลอดไป 💖
</h1>
<p>
ขอบคุณที่อยู่ด้วยกันมาตั้งแต่
<br><br>
<strong>
8 กุมภาพันธ์ 2019
</strong>
</p>
<button id="restartBtn">
🔄 ดูอีกครั้ง
</button>
</div>
<script src="script.js"></script>
</body>
</html>
